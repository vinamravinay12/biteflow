name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the pipeline only needs to read the repository contents.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (fail on high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Production build
        run: npm run build
