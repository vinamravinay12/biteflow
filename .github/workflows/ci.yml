name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the pipeline only needs to read the repository contents.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the secret scan can inspect every commit, not just
          # the tip — a key leaked and later removed is still a leaked key.
          fetch-depth: 0

      - name: Scan git history for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          # Matches the Node 22 runtime the Cloud Function targets.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (fail on high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Production build
        run: npm run build
